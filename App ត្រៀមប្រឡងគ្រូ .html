        // --- бһҹбҹ’бһҗбһ¶бһ“бһ—бһ¶бһ–бһҖбһҳбҹ’бһҳбһңбһ·бһ’бһё (State) ---
        let currentExamId = null;
        let answers = {};
        let isSubmitted = false;
        let score = 0;
        let tgUser = null;
        let isTelegram = false;
        
        let unlockedExams = []; // бһҖбһҸбҹӢбһҸбҹ’бһҡбһ¶бһңбһ·бһүбҹ’бһүбһ¶бһҹбһ¶бһҠбҹӮбһӣбһ”бһ¶бһ“бһңбһ¶бһҷбһӣбҹҒбһҒбһҹбһҳбҹ’бһ„бһ¶бһҸбҹӢбһҸбҹ’бһҡбһјбһң
        let pendingExamId = null; // бһҹбһҳбҹ’бһҡбһ¶бһ”бҹӢбһ…бһ„бһ…бһ¶бҹҶбһҗбһ¶бһ…бһ„бҹӢбһ”бһҫбһҖбһңбһ·бһүбҹ’бһүбһ¶бһҹбһ¶бһҳбһҪбһҷбһҺбһ¶

        // --- бһҖбҹҶбһҺбһҸбҹӢ Telegram WebApp ---
        const tg = window.Telegram?.WebApp;
        if (tg && tg.initDataUnsafe && Object.keys(tg.initDataUnsafe).length > 0) {
            tg.ready();
            tg.expand();
            tg.setHeaderColor('#fdf4ff');
            isTelegram = true;
            if (tg.initDataUnsafe.user) {
                tgUser = tg.initDataUnsafe.user;
            }
            
            tg.BackButton.onClick(() => {
                if (currentExamId) goBack();
            });
        }

        // --- бһўбһ“бһ»бһӮбһҳбһ“бҹҚбһӮбҹ’бһҡбһ”бҹӢбһӮбҹ’бһҡбһ„бһӣбҹҒбһҒбһҹбһҳбҹ’бһ„бһ¶бһҸбҹӢ (Password Logic) ---
        function attemptEnterExam(id) {
            const exam = examsData.find(e => e.id === id);
            
            // бһ”бһҫбһңбһ·бһүбҹ’бһүбһ¶бһҹбһ¶бһ“бҹ„бҹҮбһҳбһ¶бһ“бһӣбҹҒбһҒбһҹбһҳбҹ’бһ„бһ¶бһҸбҹӢ бһ бһҫбһҷбһҳбһ·бһ“бһ‘бһ¶бһ“бҹӢбһ”бһ¶бһ“бһҠбҹ„бҹҮбһҹбҹ„
            if (exam.password && !unlockedExams.includes(id)) {
                pendingExamId = id;
                const modal = document.getElementById('password-modal');
                const input = document.getElementById('exam-password-input');
                const errorMsg = document.getElementById('password-error');
                
                errorMsg.classList.add('hidden');
                input.value = '';
                input.classList.remove('ring-2', 'ring-rose-500', 'border-rose-500');
                
                modal.classList.remove('hidden');
                setTimeout(() => {
                    modal.firstElementChild.classList.remove('scale-95');
                    modal.firstElementChild.classList.add('scale-100');
                    input.focus();
                }, 10);
            } else {
                // бһ”бһҫбһӮбҹ’бһҳбһ¶бһ“бһӣбҹҒбһҒбһҹбһҳбҹ’бһ„бһ¶бһҸбҹӢ бһ¬бһҠбҹ„бҹҮбһҹбҹ„бһҡбһҪбһ…бһ бһҫбһҷ
                selectExam(id);
            }
        }

        function closePasswordModal() {
            const modal = document.getElementById('password-modal');
            modal.firstElementChild.classList.remove('scale-100');
            modal.firstElementChild.classList.add('scale-95');
            setTimeout(() => {
                modal.classList.add('hidden');
                pendingExamId = null;
            }, 300);
        }

        function verifyPassword() {
            const input = document.getElementById('exam-password-input');
            const errorMsg = document.getElementById('password-error');
            const exam = examsData.find(e => e.id === pendingExamId);
            
            if (input.value === exam.password) {
                unlockedExams.push(pendingExamId);
                closePasswordModal();
                setTimeout(() => {
                    selectExam(pendingExamId);
                }, 300);
            } else {
                errorMsg.classList.remove('hidden');
                input.classList.add('ring-2', 'ring-rose-500', 'border-rose-500');
                
                // бһҠбһҖбһ–бһҺбҹҢбһҖбҹ’бһҡбһ бһҳбһ…бҹҒбһүбһңбһ·бһүбһҖбҹ’бһҡбҹ„бһҷ бҹЎбһңбһ·бһ“бһ¶бһ‘бһё
                setTimeout(() => {
                    input.classList.remove('ring-2', 'ring-rose-500', 'border-rose-500');
                }, 1000);
            }
        }

        // --- бһўбһ“бһ»бһӮбһҳбһ“бҹҚбһӮбҹ’бһҡбһ”бҹӢбһӮбҹ’бһҡбһ„бһҖбһ¶бһҡбһ’бҹ’бһңбһҫбһҸбҹҒбһҹбҹ’бһҸ (Exam Logic) ---
        function selectExam(id) {
            currentExamId = id;
            answers = {};
            isSubmitted = false;
            score = 0;
            if (isTelegram) tg.BackButton.show();
            renderApp();
            window.scrollTo(0, 0);
        }

        function goBack() {
            currentExamId = null;
            if (isTelegram) tg.BackButton.hide();
            renderApp();
            window.scrollTo(0, 0);
        }

        function handleSelectOption(qIndex, optIndex) {
            if (isSubmitted) return;
            answers[qIndex] = optIndex;
            const scrollPos = window.scrollY;
            renderApp();
            window.scrollTo(0, scrollPos);
        }

        function handleSubmit() {
            const exam = examsData.find(e => e.id === currentExamId);
            const answeredCount = Object.keys(answers).length;
            
            if (answeredCount < exam.questions.length) {
                if (!window.confirm(`бһўбҹ’бһ“бһҖбһҳбһ·бһ“бһ‘бһ¶бһ“бҹӢбһҶбҹ’бһӣбһҫбһҷбһӮбҹ’бһҡбһ”бҹӢбһҹбҹҶбһҺбһҪбһҡбһ‘бҹҒ (бһҒбҹ’бһңбҹҮ ${exam.questions.length - answeredCount} бһҹбҹҶбһҺбһҪбһҡ)бҹ” бһҸбһҫбһўбҹ’бһ“бһҖбһ…бһ„бҹӢбһ”бһүбҹ’бһҮбһјбһ“бһ…бһҳбҹ’бһӣбһҫбһҷбһҘбһЎбһјбһңбһ“бҹҒбҹҮбһҳбҹӮбһ“бһ‘бҹҒ?`)) {
                    return;
                }
            }
            
            let totalScore = 0;
            exam.questions.forEach((q, index) => {
                if (answers[index] === q.correct) totalScore += q.score;
            });
            
            score = totalScore;
            isSubmitted = true;
            renderApp();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // --- бһ•бҹ’бһ“бҹӮбһҖбһҡбһ…бһ“бһ¶ Footer ---
        function getFooterHtml() {
            return `
                <div class="mt-12 mb-8 text-center animate-fade-in">
                    <div class="inline-flex items-center justify-center gap-2 px-6 py-3 rounded-full bg-white/60 backdrop-blur-md shadow-[0_4px_20px_rgb(0,0,0,0.03)] border border-white/80">
                        <i class="fa-solid fa-wand-magic-sparkles text-amber-400"></i>
                        <span class="text-sm font-khmer text-slate-600">
                            бһҡбҹҖбһ”бһҡбҹҖбһ„бһҠбҹ„бһҷ <span class="font-bold bg-gradient-to-r from-pink-500 via-rose-500 to-violet-600 bg-clip-text text-transparent">бһҸбһҝбһ“ бһҹбһ»бһҖбһ¶бһ“бҹӢбһҷбҹүбһ¶</span>
                        </span>
                        <i class="fa-solid fa-heart text-rose-500 animate-pulse drop-shadow-sm"></i>
                    </div>
                </div>
            `;
        }

        // --- бһ•бҹ’бһ“бҹӮбһҖбһ”бһ„бҹ’бһ бһ¶бһү HTML (Render) ---
        function renderApp() {
            const appRoot = document.getElementById('app-root');
            
            if (!currentExamId) {
                // бҹЎ. бһ”бһ„бҹ’бһ бһ¶бһүбһ”бһүбҹ’бһҮбһёбһңбһ·бһүбҹ’бһүбһ¶бһҹбһ¶ (Exam List)
                let listHtml = `
                    <div class="max-w-4xl mx-auto p-4 md:p-6 lg:p-8 min-h-screen flex flex-col relative z-10 animate-fade-in">
                        <div class="flex flex-col md:flex-row md:justify-between md:items-center gap-4 mb-10">
                            <div>
                                <h1 class="text-4xl md:text-5xl lg:text-6xl font-black font-khmer bg-gradient-to-r from-pink-500 via-purple-500 to-rose-400 bg-clip-text text-transparent pb-2 drop-shadow-md tracking-wide leading-tight">
                                    бһҹбҹҖбһңбһ—бҹ… бһҸбҹ’бһҡбҹҖбһҳбһ”бҹ’бһҡбһЎбһ„бһӮбҹ’бһҡбһјбһ“бһ¶бһ“бһ¶
                                </h1>
                                <p class="text-base md:text-lg font-khmer mt-2 flex items-center gap-2 text-slate-500">
                                    <i class="fa-solid fa-graduation-cap text-pink-500 animate-bounce text-xl"></i>
                                    бһҜбһҖбһ‘бҹҒбһҹбһӮбһҺбһ·бһҸбһңбһ·бһ‘бҹ’бһҷбһ¶
                                </p>
                            </div>
                            ${tgUser ? `
                            <div class="bg-gradient-to-br from-pink-100 to-purple-100 p-3.5 rounded-3xl shadow-sm border border-white self-start md:self-auto flex items-center gap-3">
                                <i class="fa-solid fa-user text-purple-600 text-2xl"></i>
                                <span class="font-khmer font-bold text-purple-800">${tgUser.first_name}</span>
                            </div>
                            ` : `
                            <div class="bg-white/80 p-3.5 rounded-3xl shadow-sm border border-pink-100 self-start md:self-auto">
                                <i class="fa-solid fa-book-open text-pink-400 text-2xl"></i>
                            </div>
                            `}
                        </div>
                        <div class="space-y-4 flex-1">
                `;

                examsData.forEach(exam => {
                    const isUnlocked = unlockedExams.includes(exam.id) || !exam.password;
                    
                    listHtml += `
                        <div onclick="attemptEnterExam(${exam.id})" class="group bg-white/80 backdrop-blur-md rounded-2xl shadow-[0_2px_10px_rgb(0,0,0,0.02)] hover:shadow-[0_8px_30px_rgb(0,0,0,0.08)] border border-slate-100/60 p-4 transition-all duration-300 cursor-pointer flex items-center gap-4 hover:-translate-y-1 hover:border-pink-200">
                            <div class="relative">
                                <div class="absolute inset-0 bg-gradient-to-br ${exam.color} rounded-2xl blur-md opacity-40 group-hover:opacity-60 transition-opacity duration-300"></div>
                                <div class="relative w-16 h-16 rounded-2xl flex items-center justify-center bg-gradient-to-br ${exam.color} text-white shadow-inner">
                                    ${exam.icon}
                                </div>
                            </div>
                            <div class="flex-1 min-w-0 pl-1">
                                <div class="flex items-center gap-2">
                                    <h3 class="text-lg md:text-xl font-bold text-slate-800 font-khmer truncate group-hover:text-pink-600 transition-colors">
                                        ${exam.title}
                                    </h3>
                                    ${!isUnlocked ? '<i class="fa-solid fa-lock text-slate-300 text-sm"></i>' : ''}
                                </div>
                                <p class="text-sm text-slate-500 font-khmer truncate mt-0.5">
                                    ${exam.topic}
                                </p>
                                <div class="flex flex-wrap items-center gap-2 mt-2.5">
                                    <span class="inline-flex items-center gap-1 text-[11px] md:text-xs font-semibold px-2.5 py-1 rounded-md ${exam.bgLight} ${exam.textColor} font-khmer">
                                        <i class="fa-regular fa-file-lines"></i> ${exam.questions.length} бһҹбҹҶбһҺбһҪбһҡ
                                    </span>
                                    <span class="inline-flex items-center gap-1 text-[11px] md:text-xs font-medium text-slate-500 bg-slate-100 px-2.5 py-1 rounded-md font-khmer border border-slate-200/60">
                                        <i class="fa-regular fa-clock"></i> ${exam.duration}
                                    </span>
                                </div>
                            </div>
                            <div class="shrink-0 w-10 h-10 rounded-full bg-slate-50 flex items-center justify-center text-slate-400 group-hover:bg-pink-100 group-hover:text-pink-600 transition-colors mr-1">
                                <i class="fa-solid fa-chevron-right"></i>
                            </div>
                        </div>
                    `;
                });

                listHtml += `</div> ${getFooterHtml()} </div>`;
                appRoot.innerHTML = listHtml;

            } else {
                // бҹў. бһ”бһ„бҹ’бһ бһ¶бһүбһ‘бҹҶбһ–бҹҗбһҡбһңбһ·бһүбҹ’бһүбһ¶бһҹбһ¶ (Exam Detail)
                const exam = examsData.find(e => e.id === currentExamId);
                const isPassed = score >= (exam.total_score / 2);
                
                const answeredCount = Object.keys(answers).length;
                let correctCount = 0;
                exam.questions.forEach((q, i) => { if(answers[i] === q.correct) correctCount++; });
                const wrongCount = answeredCount - correctCount;
                const missingCount = exam.questions.length - answeredCount;

                let headerGradient = `bg-gradient-to-br ${exam.color}`;
                if (isSubmitted) {
                    headerGradient = isPassed ? 'bg-gradient-to-br from-emerald-400 via-emerald-500 to-teal-600' : 'bg-gradient-to-br from-rose-400 via-rose-500 to-red-600';
                }

                let detailHtml = `
                    <div class="max-w-4xl mx-auto p-4 md:p-6 lg:p-8 min-h-screen flex flex-col relative animate-fade-in">
                        ${(!isTelegram && !isSubmitted) ? `
                            <button onclick="goBack()" class="flex items-center gap-2 text-slate-500 hover:text-pink-600 transition-colors mb-4 font-khmer bg-white/60 backdrop-blur-md px-4 py-2.5 rounded-xl shadow-sm w-fit border border-slate-200/60 text-sm font-medium hover:shadow-md">
                                <i class="fa-solid fa-arrow-left"></i> <span>бһҸбҹ’бһҡбһЎбһ”бҹӢбһҖбҹ’бһҡбҹ„бһҷ</span>
                            </button>
                        ` : ''}

                        <div class="bg-white/80 backdrop-blur-xl rounded-[2rem] shadow-xl border border-white overflow-hidden flex-1">
                            
                            <!-- Header -->
                            <div class="relative p-8 md:p-10 text-center text-white transition-all duration-700 ${headerGradient}">
                                <div class="absolute top-0 right-0 -mr-16 -mt-16 w-64 h-64 bg-white/10 rounded-full blur-3xl"></div>
                                <div class="absolute bottom-0 left-0 -ml-16 -mb-16 w-48 h-48 bg-black/10 rounded-full blur-3xl"></div>
                                
                                <div class="absolute right-6 top-6 opacity-10 transform rotate-12 text-7xl">
                                    ${exam.icon}
                                </div>
                                
                                <div class="relative z-10">
                `;

                if (isSubmitted) {
                    detailHtml += `
                                    <div class="animate-zoom-in">
                                        <h2 class="text-2xl md:text-4xl font-black mb-8 font-khmer drop-shadow-md">
                                            ${isPassed ? 'рҹҺү бһўбһ”бһўбһҡбһҹбһ¶бһ‘бһҡ! бһўбҹ’бһ“бһҖбһ”бҹ’бһҡбһЎбһ„бһҮбһ¶бһ”бҹӢбҹ”' : 'рҹ’Ә бһҹбһјбһҳбһҒбһ·бһҸбһҒбҹҶбһ”бҹ’бһҡбһ№бһ„бһ”бҹ’бһҡбҹӮбһ„бһ”бһ“бҹ’бһҗбҹӮбһҳбһ‘бҹҖбһҸ!'}
                                        </h2>
                                        <div class="bg-white/95 backdrop-blur-sm text-slate-800 p-8 rounded-[2rem] shadow-2xl max-w-sm mx-auto w-full border border-white/40 transform transition-transform hover:scale-105 duration-500">
                                            <p class="text-xs font-khmer font-bold text-slate-400 mb-5 uppercase tracking-widest">бһ–бһ·бһ“бҹ’бһ‘бһ»бһҹбһҡбһ»бһ”бһҡбһ”бһҹбҹӢбһўбҹ’бһ“бһҖ</p>
                                            
                                            <div class="flex justify-center mb-8 relative">
                                                <div class="absolute inset-0 rounded-full blur-xl opacity-40 ${isPassed ? 'bg-emerald-400' : 'bg-rose-400'}"></div>
                                                <div class="relative w-40 h-40 rounded-full flex flex-col items-center justify-center border-[10px] ${isPassed ? 'border-emerald-500 text-emerald-600' : 'border-rose-500 text-rose-600'} bg-white shadow-inner">
                                                    <span class="text-6xl font-black">${score}</span>
                                                    <span class="text-lg font-bold text-slate-300 border-t-2 border-slate-100 pt-1 mt-1">/ ${exam.total_score}</span>
                                                </div>
                                            </div>

                                            <div class="space-y-3.5 font-khmer text-[15px] font-medium">
                                                <div class="flex justify-between items-center py-2.5 border-b border-slate-100/80">
                                                    <span class="text-slate-500">бһҹбҹ’бһҗбһ¶бһ“бһ—бһ¶бһ–бҹ–</span>
                                                    <span class="px-4 py-1.5 rounded-full text-sm font-bold shadow-sm ${isPassed ? 'bg-emerald-100 text-emerald-700 border border-emerald-200' : 'bg-rose-100 text-rose-700 border border-rose-200'}">
                                                        ${isPassed ? 'бһҮбһ¶бһ”бҹӢбһҮбһ¶бһҹбҹ’бһҗбһ¶бһ–бһҡ' : 'бһ’бҹ’бһӣбһ¶бһҖбҹӢ'}
                                                    </span>
                                                </div>
                                                <div class="flex justify-between items-center py-2.5 border-b border-slate-100/80">
                                                    <span class="text-slate-500">бһҹбҹҶбһҺбһҪбһҡбһҸбҹ’бһҡбһјбһңбҹ–</span>
                                                    <span class="text-emerald-600 flex items-center gap-1.5 font-bold"><i class="fa-solid fa-circle-check"></i> ${correctCount}</span>
                                                </div>
                                                <div class="flex justify-between items-center py-2.5 border-b border-slate-100/80">
                                                    <span class="text-slate-500">бһҹбҹҶбһҺбһҪбһҡбһҒбһ»бһҹбҹ–</span>
                                                    <span class="text-rose-600 flex items-center gap-1.5 font-bold"><i class="fa-solid fa-circle-xmark"></i> ${wrongCount}</span>
                                                </div>
                                                <div class="flex justify-between items-center py-2.5">
                                                    <span class="text-slate-500">бһҳбһ·бһ“бһ”бһ¶бһ“бһҶбҹ’бһӣбһҫбһҷбҹ–</span>
                                                    <span class="text-amber-500 flex items-center gap-1.5 font-bold"><i class="fa-regular fa-clock"></i> ${missingCount}</span>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                    `;
                } else {
                    detailHtml += `
                                    <div class="animate-fade-in">
                                        <span class="inline-block bg-white/20 backdrop-blur-md px-4 py-1.5 rounded-full text-xs font-semibold mb-4 border border-white/30 font-khmer uppercase tracking-wider shadow-sm">бһҖбһ¶бһҡбһ”бҹ’бһҡбһЎбһ„ QCM</span>
                                        <h2 class="text-3xl md:text-4xl font-black mb-3 font-khmer drop-shadow-md">${exam.title}</h2>
                                        <h3 class="text-lg md:text-xl text-white/90 font-medium mb-8 font-khmer drop-shadow-sm">${exam.topic}</h3>
                                        <div class="flex flex-wrap justify-center items-center gap-3 md:gap-6 bg-white/10 backdrop-blur-md px-6 py-3 rounded-2xl border border-white/20 font-khmer text-sm w-fit mx-auto shadow-sm">
                                            <span class="flex items-center gap-2 font-medium"><i class="fa-regular fa-clock text-white/80"></i> ${exam.duration}</span>
                                            <span class="w-1.5 h-1.5 rounded-full bg-white/40 hidden md:inline"></span>
                                            <span class="flex items-center gap-2 font-medium"><i class="fa-regular fa-file-lines text-white/80"></i> ${exam.questions.length} бһҹбҹҶбһҺбһҪбһҡ</span>
                                        </div>
                                    </div>
                    `;
                }

                detailHtml += `</div></div> <div class="p-5 md:p-10 space-y-8 font-khmer text-base">`;

                if (isSubmitted) {
                    detailHtml += `
                        <div class="bg-gradient-to-r from-pink-50 to-purple-50 border border-pink-100/50 text-pink-800 p-4 rounded-2xl text-center font-medium font-khmer mb-8 shadow-sm flex justify-center items-center gap-2">
                            <i class="fa-solid fa-wand-magic-sparkles text-pink-500"></i> бһўбһјбһҹбһ…бһ»бҹҮбһҖбҹ’бһҡбҹ„бһҳбһҠбһҫбһҳбҹ’бһ”бһёбһ•бҹ’бһ‘бҹҖбһ„бһ•бҹ’бһ‘бһ¶бһҸбҹӢбһҖбҹҶбһ бһ»бһҹбһҡбһ”бһҹбҹӢбһўбҹ’бһ“бһҖ
                        </div>
                    `;
                }

                exam.questions.forEach((item, qIndex) => {
                    detailHtml += `
                        <div class="space-y-4">
                            <div class="flex justify-between items-start gap-4 bg-slate-50/80 backdrop-blur-sm p-5 md:p-6 rounded-2xl border border-slate-100 shadow-sm">
                                <h4 class="font-bold text-slate-800 flex-1 leading-loose text-lg overflow-x-auto">${item.q}</h4>
                                <span class="shrink-0 text-xs md:text-sm px-3.5 py-1.5 rounded-lg font-bold ${exam.bgLight} ${exam.textColor} border border-white shadow-sm mt-1">
                                    ${item.score} бһ–бһ·бһ“бҹ’бһ‘бһ»
                                </span>
                            </div>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-3 md:gap-4 mt-4 px-1">
                    `;

                    item.options.forEach((opt, optIndex) => {
                        const isSelected = answers[qIndex] === optIndex;
                        const isCorrect = item.correct === optIndex;
                        const showCorrect = isSubmitted && isCorrect;
                        const showWrong = isSubmitted && isSelected && !isCorrect;

                        let btnClass = "border-slate-200 bg-white text-slate-600";
                        let iconHtml = "";

                        if (isSubmitted) {
                            if (showCorrect) {
                                btnClass = "border-emerald-500 bg-emerald-50 text-emerald-800 ring-2 ring-emerald-500/30 shadow-md font-medium z-10";
                                iconHtml = '<i class="fa-solid fa-circle-check text-emerald-500 text-xl shrink-0"></i>';
                            } else if (showWrong) {
                                btnClass = "border-rose-500 bg-rose-50 text-rose-800 ring-2 ring-rose-500/30 shadow-md font-medium z-10";
                                iconHtml = '<i class="fa-solid fa-circle-xmark text-rose-500 text-xl shrink-0"></i>';
                            } else {
                                btnClass = "border-slate-100 bg-slate-50/50 opacity-50";
                            }
                        } else if (isSelected) {
                            btnClass = "border-pink-500 bg-pink-50/50 text-pink-800 ring-2 ring-pink-500/40 shadow-md font-medium z-10 transform scale-[1.01]";
                        } else {
                            btnClass += " hover:border-pink-300 hover:bg-slate-50 hover:shadow-sm";
                        }

                        detailHtml += `
                            <button onclick="handleSelectOption(${qIndex}, ${optIndex})" ${isSubmitted ? 'disabled' : ''} 
                                    class="flex items-center justify-between p-4 md:p-5 rounded-2xl border text-left transition-all duration-300 overflow-x-auto ${btnClass}">
                                <span class="leading-relaxed">${opt}</span>
                                ${iconHtml ? `<span class="ml-3 drop-shadow-sm">${iconHtml}</span>` : ''}
                            </button>
                        `;
                    });

                    detailHtml += `</div></div>`;
                });

                detailHtml += `</div>`; // бһ”бһ·бһ‘бһ”бҹ’бһҡбһўбһ”бҹӢбһҹбҹҶбһҺбһҪбһҡ

                // Action Buttons
                detailHtml += `<div class="bg-white/90 backdrop-blur-xl p-6 border-t border-slate-100 flex flex-col sm:flex-row justify-center items-center gap-4 sticky bottom-0 z-20 shadow-[0_-20px_40px_rgba(0,0,0,0.03)]">`;
                
                if (!isSubmitted) {
                    detailHtml += `
                        <button onclick="handleSubmit()" class="w-full sm:w-auto bg-gradient-to-r from-pink-500 to-purple-500 hover:from-pink-600 hover:to-purple-600 text-white font-khmer font-bold py-4 px-12 rounded-2xl shadow-[0_8px_20px_rgba(236,72,153,0.3)] hover:shadow-[0_12px_25px_rgba(236,72,153,0.4)] transition-all flex items-center justify-center gap-2 transform hover:-translate-y-1">
                            <i class="fa-solid fa-circle-check text-xl"></i> бһ”бһүбҹ’бһҮбһјбһ“бһ…бһҳбҹ’бһӣбһҫбһҷ (Submit)
                        </button>
                    `;
                } else {
                    detailHtml += `
                        <button onclick="goBack()" class="w-full sm:w-auto bg-slate-800 hover:bg-slate-900 text-white font-khmer font-bold py-4 px-12 rounded-2xl shadow-[0_8px_20px_rgba(15,23,42,0.2)] hover:shadow-[0_12px_25px_rgba(15,23,42,0.3)] transition-all flex items-center justify-center gap-2 transform hover:-translate-y-1">
                            <i class="fa-solid fa-house text-xl"></i> бһҸбҹ’бһҡбһЎбһ”бҹӢбһ‘бҹ…бһ‘бҹҶбһ–бҹҗбһҡбһҠбһҫбһҳ
                        </button>
                    `;
                }
                
                detailHtml += `</div></div> ${getFooterHtml()} </div>`;
                appRoot.innerHTML = detailHtml;

                // бһҠбҹҶбһҺбһҫбһҡбһҖбһ¶бһҡ MathJax бһ”бһ“бҹ’бһ‘бһ¶бһ”бҹӢбһ–бһё Render HTML бһҡбһҪбһ…
                if (window.MathJax && window.MathJax.typesetPromise) {
                    window.MathJax.typesetPromise().catch((err) => console.log(err));
                }
            }
        }

        // бһ…бһ¶бһ”бҹӢбһ•бҹ’бһҸбһҫбһҳ Render бһҖбһҳбҹ’бһҳбһңбһ·бһ’бһёбһҠбҹҶбһ”бһјбһ„
        renderApp();

    </script>
</body>
</html>
